<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC TAC TOE GAME</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>
    <h1>Tic Tac Toe!</h1>
    <div class="box">
        <div class="row1 row">
            <div class="a" id="a1"></div>
            <div class="a" id="a2"></div>
            <div class="a" id="a3"></div>
        </div>
        <div class="row2 row">
            <div class="a" id="b1"></div>
            <div class="a" id="b2"></div>
            <div class="a" id="b3"></div>
        </div>
        <div class="row3 row">
            <div class="a" id="c1"></div>
            <div class="a" id="c2"></div>
            <div class="a" id="c3"></div>
        </div>
    </div>
    <div class="yourScore">
        <p class="yours">player1</p>
        <p class="score1">0</p>
    </div>
    <div class="compScore">
        <p class="comp">player2</p>
        <p class="score2">0</p>
    </div>
    <div class="msgContainer">
        <div class="msg">Start your game!</div>
    </div>
    <script src="project.js"></script>
</body>
</html>
